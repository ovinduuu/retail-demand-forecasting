name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        # "gcp"/"data"/"prophet" extras need real credentials or a heavy
        # native build (kaggle, prophet's cmdstan) not yet exercised by any
        # test. "ml" (lightgbm/scikit-learn) and "pipelines" (kfp,
        # google-cloud-aiplatform) are plain wheel installs needed by
        # tests/test_train.py and tests/test_training_pipeline.py.
        run: uv sync --extra dev --extra ml --extra pipelines

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v
