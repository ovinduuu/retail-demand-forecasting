name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        # "gcp"/"data"/"prophet" extras need real credentials or a heavy
        # native build (kaggle, prophet's cmdstan) not yet exercised by any
        # test. "ml" (lightgbm/scikit-learn) is a plain wheel install and is
        # needed by tests/test_train.py.
        run: uv sync --extra dev --extra ml

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v
