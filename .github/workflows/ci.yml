name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        # "gcp"/"data"/"prophet" extras need real credentials or a heavy
        # native build (kaggle, prophet's cmdstan) not yet exercised by any
        # test. "ml", "pipelines", and "serving" are plain wheel installs
        # needed by tests/test_train.py, tests/test_training_pipeline.py,
        # and tests/test_serving_app.py respectively.
        run: uv sync --extra dev --extra ml --extra pipelines --extra serving

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v

  frontend-lint-and-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
