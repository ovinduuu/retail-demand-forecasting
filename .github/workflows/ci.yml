name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        # Only base + dev deps for now: the "gcp"/"data"/"ml" extras need
        # real credentials or heavy native deps (kaggle, lightgbm, prophet)
        # not yet exercised by any test. Widen this as later phases add
        # tests that need them.
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -v
